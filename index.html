<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>输入数字</title>
</head>

<body style="text-align:center; margin-top:100px; font-family:sans-serif;">

  <h2>현재 앉으신 자리번호를 입력해 주세요</h2>
  <h4>숫자만 입력하신 후, "다음"버튼을 눌러주세요</h4>

  <input type="number" id="userInput" style="padding:10px; font-size:16px;">
  <br><br>

  <button onclick="goNext()" style="padding:10px 20px; font-size:16px;">다음</button>

  <script>
    function goNext() {
      var input = document.getElementById("userInput").value;

      if (input !== "") {
        // 跳转到下一页，并带上参数
        window.location.href = "result.html?seat=" + input;
      } else {
        alert("숫자를 입력해 주세요");
      }
    }
  </script>

</body>
</html>
